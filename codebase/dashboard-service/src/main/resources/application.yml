spring:
  application:
    name: dashboard-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    listener:
      concurrency: 1
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
      acks: all
      retries: 3
    consumer:
      group-id: dashboard-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.jobstream.dto"
        spring.deserializer.value.retryable: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
# Topics configuration
app:
  kafka:
    topics:
      to-analyze: job-to-analyzed
      analyzed: analyzed-jobs

# JSearch API configuration (RapidAPI)
jsearch:
  api:
    base-url: https://jsearch.p.rapidapi.com
    host: jsearch.p.rapidapi.com
    key: ${RAPIDAPI_KEY:}

# Adzuna API configuration
adzuna:
  api:
    base-url: http://api.adzuna.com/
    app-id: ${ADZUNA_APP_ID}
    app-key: ${ADZUNA_APP_KEY}
    default-country: ${ADZUNA_DEFAULT_COUNTRY:ch}
