spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: update
      show-sql: true

# Disable Kafka for tests
  kafka:
    consumer:
      auto-startup: false
    producer:
      auto-startup: false

# Adzuna API test configuration - will be overridden by WireMockConfig
adzuna:
  api:
    base-url: http://localhost:9999
    app-id: test-app-id
    app-key: test-app-key
    default-country: ch