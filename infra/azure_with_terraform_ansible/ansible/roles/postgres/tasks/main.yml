- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Check if PostgreSQL is up
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Create database
  postgresql_db:
    name: jobstream_db
  become_user: postgres

- name: Create user
  postgresql_user:
    db: "{{db_name}}"
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "ALL"
  become_user: postgres